<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Harbor - Storyboard 01</title>
    <style>
      :root {
        --bg: #030407;
        --dot: rgba(255, 255, 255, 0.12);
        --dot-soft: rgba(255, 255, 255, 0.05);
        --text: #f7f4eb;
        --muted: rgba(247, 244, 235, 0.66);
        --line: rgba(247, 244, 235, 0.18);
        --accent: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      #stage {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 22%, rgba(255, 255, 255, 0.08), transparent 28%),
          radial-gradient(circle at 82% 78%, rgba(255, 255, 255, 0.06), transparent 30%),
          radial-gradient(circle, var(--dot) 0 1.4px, transparent 1.6px),
          radial-gradient(circle, var(--dot-soft) 0 1px, transparent 1.2px),
          var(--bg);
        background-size: auto, auto, 28px 28px, 84px 84px, auto;
      }

      #stage::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 20;
        pointer-events: none;
        background:
          linear-gradient(90deg, rgba(3, 4, 7, 0.96), transparent 24%, transparent 72%, rgba(3, 4, 7, 0.78)),
          linear-gradient(180deg, rgba(3, 4, 7, 0.86), transparent 22%, transparent 76%, rgba(3, 4, 7, 0.9));
      }

      .clip {
        position: absolute;
      }

      .copy {
        left: 88px;
        top: 246px;
        z-index: 30;
        width: 690px;
      }

      h1 {
        margin: 0;
        color: var(--text);
        font-size: 86px;
        line-height: 0.96;
        font-weight: 650;
        letter-spacing: -0.03em;
      }

      .subcopy {
        margin: 34px 0 0;
        max-width: 560px;
        color: var(--muted);
        font-size: 30px;
        line-height: 1.28;
        font-weight: 430;
      }

      .underline {
        left: 88px;
        top: 792px;
        z-index: 30;
        width: 560px;
        height: 2px;
        opacity: 0;
        background: var(--line);
        overflow: hidden;
      }

      .underline span {
        display: block;
        width: 100%;
        height: 100%;
        background: var(--accent);
        transform: translateX(-102%);
      }

      .video-shell {
        right: 78px;
        top: 126px;
        z-index: 25;
        width: 982px;
        height: 552px;
        border: 1px solid rgba(247, 244, 235, 0.24);
        border-radius: 26px;
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 42px 120px rgba(0, 0, 0, 0.55);
        overflow: hidden;
      }

      .catalog-video {
        right: 78px;
        top: 126px;
        z-index: 26;
        width: 982px;
        height: 552px;
        border: 1px solid rgba(247, 244, 235, 0.24);
        border-radius: 26px;
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 42px 120px rgba(0, 0, 0, 0.55);
        object-fit: cover;
        overflow: hidden;
      }

      .catalog-freeze {
        right: 78px;
        top: 126px;
        z-index: 27;
        width: 982px;
        height: 552px;
        border: 1px solid rgba(247, 244, 235, 0.24);
        border-radius: 26px;
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 42px 120px rgba(0, 0, 0, 0.55);
        object-fit: cover;
        overflow: hidden;
      }

      .seidor-logo {
        right: 88px;
        bottom: 70px;
        z-index: 30;
        width: 138px;
        padding: 12px 14px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.32);
      }

      .seidor-logo img {
        width: 100%;
        display: block;
      }

      .rule {
        right: 78px;
        top: 730px;
        z-index: 25;
        width: 982px;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(247, 244, 235, 0.24), transparent);
      }
    </style>
  </head>
  <body>
    <div id="stage" data-composition-id="main" data-start="0" data-width="1920" data-height="1080" data-duration="10">
      <div id="copy" class="clip copy" data-start="0" data-duration="10" data-track-index="1">
        <h1>Tu catálogo cambia más rápido de lo que tu equipo puede revisarlo.</h1>
        <p class="subcopy">Cada campo pendiente retrasa la publicación, la calidad y las ventas.</p>
      </div>

      <div id="underline" class="clip underline" data-start="0" data-duration="10" data-track-index="3" data-layout-allow-overflow><span></span></div>

      <div id="video-shell" class="clip video-shell" data-start="0" data-duration="10" data-track-index="4"></div>
      <video id="catalog-video" class="clip catalog-video" data-start="1.15" data-duration="7.83" data-track-index="5" data-has-audio="false" muted src="assets/mirakl-catalog-broken.mp4"></video>
      <img id="catalog-freeze" class="clip catalog-freeze" data-start="8.92" data-duration="1.08" data-track-index="6" src="assets/mirakl-catalog-broken-freeze.png" alt="" />
      <div id="rule" class="clip rule" data-start="0" data-duration="10" data-track-index="7"></div>
      <div id="seidor-logo" class="clip seidor-logo" data-start="0" data-duration="10" data-track-index="8">
        <img src="assets/seidor.svg" alt="SEIDOR" />
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

      tl.from("#copy h1", { y: 56, opacity: 0, duration: 0.78 }, 0.75);
      tl.from("#copy .subcopy", { y: 34, opacity: 0, duration: 0.56 }, 1.45);
      tl.fromTo("#underline", { y: 14, opacity: 0 }, { y: 0, opacity: 1, duration: 0.42 }, 1.55);
      tl.to("#underline span", { x: 0, duration: 0.7, ease: "expo.out" }, 1.68);
      tl.from("#video-shell", { x: 86, opacity: 0, scale: 0.975, duration: 0.72 }, 1.05);
      tl.from("#catalog-video", { scale: 1.04, opacity: 0, duration: 0.5 }, 1.18);
      tl.from("#rule", { scaleX: 0, opacity: 0, transformOrigin: "50% 50%", duration: 0.55 }, 1.8);
      tl.from("#seidor-logo", { y: 18, opacity: 0, duration: 0.45 }, 1.9);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
