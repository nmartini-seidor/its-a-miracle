<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SEIDOR Fullscreen Logo Reveal</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
      }

      #stage {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
      }

      .clip {
        position: absolute;
      }

      .background-video,
      .hold-frame {
        inset: 0;
        z-index: 1;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .hold-frame {
        z-index: 2;
      }

      .white-band {
        left: 0;
        bottom: 0;
        z-index: 4;
        width: 1920px;
        height: 188px;
        background: #fff;
        transform-origin: left center;
        transform: scaleX(0);
        box-shadow: 0 -18px 44px rgba(255, 255, 255, 0.16);
      }

      .logo-wrap {
        left: 50%;
        bottom: 10px;
        z-index: 5;
        width: 360px;
        height: 171px;
        transform: translateX(-50%);
        overflow: hidden;
        clip-path: inset(0 100% 0 0);
        filter: drop-shadow(0 12px 22px rgba(0, 0, 0, 0.12));
      }

      .logo-wrap img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .factory-wrap {
        left: calc(50% + 150px);
        bottom: 34px;
        z-index: 5;
        width: 120px;
        height: 42px;
        overflow: hidden;
        clip-path: inset(0 100% 0 0);
      }

      .factory-wrap img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        filter: invert(1) brightness(0.34) sepia(1) saturate(4.5) hue-rotate(170deg);
      }

      .reveal-light {
        left: 0;
        bottom: 0;
        z-index: 6;
        width: 120px;
        height: 188px;
        opacity: 0;
        pointer-events: none;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.86), transparent);
        filter: blur(10px);
        mix-blend-mode: screen;
      }
    </style>
  </head>
  <body>
    <div id="stage" data-composition-id="main" data-start="0" data-width="1920" data-height="1080" data-duration="10.041667">
      <video
        id="background-video"
        class="clip background-video"
        data-start="0"
        data-duration="6.041667"
        data-track-index="1"
        data-has-audio="false"
        muted
        src="assets/background-upscaled-keyframed.mp4"
      ></video>
      <img
        id="hold-frame"
        class="clip hold-frame"
        data-start="6.041667"
        data-duration="4"
        data-track-index="2"
        src="assets/background-upscaled-last-frame.png"
        alt=""
      />

      <div id="white-band" class="clip white-band" data-start="0" data-duration="10.041667" data-track-index="3"></div>
      <div id="logo-wrap" class="clip logo-wrap" data-start="0" data-duration="10.041667" data-track-index="4">
        <img src="assets/seidor.svg" alt="SEIDOR" />
      </div>
      <div id="factory-wrap" class="clip factory-wrap" data-start="0" data-duration="10.041667" data-track-index="5">
        <img src="assets/ai-factory.png" alt="AI Factory" />
      </div>
      <div id="reveal-light" class="clip reveal-light" data-start="0" data-duration="10.041667" data-track-index="6" data-layout-ignore></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from("#background-video", { scale: 1.035, opacity: 0, duration: 0.36, ease: "power2.out" }, 0);
      tl.from("#hold-frame", { opacity: 0, duration: 0.02 }, 6.041667);
      tl.to("#white-band", { scaleX: 1, duration: 1.28, ease: "power2.inOut" }, 3);
      tl.to("#logo-wrap", { clipPath: "inset(0 0% 0 0)", duration: 0.48, ease: "power2.out" }, 3.42);
      tl.to("#factory-wrap", { clipPath: "inset(0 0% 0 0)", duration: 0.46, ease: "power2.out" }, 3.74);
      tl.fromTo(
        "#reveal-light",
        { x: 0, opacity: 0 },
        { x: 1900, opacity: 0.82, duration: 1.2, ease: "power2.inOut" },
        3.02
      );
      tl.to("#reveal-light", { opacity: 0, duration: 0.24, ease: "power2.out" }, 4.22);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
